<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>View Logs</title>
    <style>
        body {
            font-family: sans-serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
        }

        .log-item {
            border-left: 4px solid #007BFF;
            background: #f9f9f9;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 0 5px 5px 0;
        }

        .meta {
            font-size: 0.85em;
            color: #666;
            margin-bottom: 5px;
        }
    </style>
</head>

<body>

    <h2>Recent Logs</h2>
    <div id="logsContainer">Loading logs...</div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, query, orderBy, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // ⚠️ USE THE EXACT SAME FIREBASE CONFIG HERE
        const firebaseConfig = {
            apiKey: "AIzaSyBWl-uJKNPU7Kv7bLLN8cl84AtjDadDSWo",
            authDomain: "dalogger-3c900.firebaseapp.com",
            projectId: "dalogger-3c900",
            storageBucket: "dalogger-3c900.firebasestorage.app",
            messagingSenderId: "486768430143",
            appId: "1:486768430143:web:d49fb78c2bb29954d1fc8a",
            measurementId: "G-3P3RTFVKHT"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        async function fetchLogs() {
            const logsContainer = document.getElementById('logsContainer');

            // Query: Grab 'logs' collection, ordered by timestamp descending (newest first)
            const q = query(collection(db, "logs"), orderBy("timestamp", "desc"));

            try {
                const querySnapshot = await getDocs(q);
                logsContainer.innerHTML = ''; // Clear loading text

                if (querySnapshot.empty) {
                    logsContainer.innerHTML = '<p>No logs found.</p>';
                    return;
                }

                querySnapshot.forEach((doc) => {
                    const data = doc.data();

                    // Convert Firebase timestamp to readable JS Date string
                    const dateStr = data.timestamp ? data.timestamp.toDate().toLocaleString() : "Just now";

                    // Create HTML structure for each log
                    const logElement = document.createElement('div');
                    logElement.className = 'log-item';
                    logElement.innerHTML = `
                        <div class="meta">📅 ${dateStr} | 📍 Coords: ${data.latitude.toFixed(4)}, ${data.longitude.toFixed(4)}</div>
                        <strong>Description:</strong> ${data.description}
                    `;
                    logsContainer.appendChild(logElement);
                });
            } catch (error) {
                console.error("Error fetching logs: ", error);
                logsContainer.innerHTML = '<p>Error loading logs. Make sure Firebase rules are set to test mode.</p>';
            }
        }

        // Run fetch on page load
        fetchLogs();
    </script>
</body>

</html>
