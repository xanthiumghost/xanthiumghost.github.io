<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Homo Page!</title>
    <link rel="shortcut icon" href="img/sword.png" type="image/x-icon">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bungee+Spice&display=swap" rel="stylesheet">
</head>
<style>
    .inline {
        display: inline;
    }

    p.inline {
        vertical-align: middle;
    }

    #logotitle {
        text-align: center;
        border: 1px solid orangered;
        border-radius: 10px;
        width: 85%;
        background-color: rgba(255, 68, 0, 0.2);
        padding: 10px;
        margin: 20px auto;
    }

    #title{
        font-family: "Bungee Spice", sans-serif;
        font-weight: 400;
        font-style: normal;
    }
    .titleimg{
        width: 100px;
    }
    body{
        background-color: black;
        color: white;
        padding: 20px;
    }
</style>

<body>
    <div id="container">
        <div id="logotitle">
            <img src="img/bom.png" class="titleimg">
            <p style="font-size: 50px;" id="title">THE LAST STAND</p>
            <img src="img/skull.png" class="titleimg">
        </div>
    </div>
    <p id="count"></p>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>

    <script>
        var countDownDate = new Date("Mar 9, 2024 12:00:00").getTime();
        var x = setInterval(function () {
            var now = new Date().getTime();
            var distance = countDownDate - now;
            var days = Math.floor(distance / (1000 * 60 * 60 * 24));
            var hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            var minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            var seconds = Math.floor((distance % (1000 * 60)) / 1000);
            document.getElementById("count").innerHTML = "Time to event: " + days + "D " + hours + "H "
                + minutes + "M " + seconds + "S ";
            if (distance < 0) {
                clearInterval(x);
                document.getElementById("demo").innerHTML = "Event has begun";
            }
        }, 1000);
    </script>
</body>

</html>
